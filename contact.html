<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap" rel="stylesheet">
    <title>contact</title>

</head>

<body>
    <div class="container">
        <div class="section-one">
            <h1 class="section-one__name">Dinesh Chandrasekar</h1>
            <p class="section-one__role">I am a full stack developer</p>
            <a href="index.html" class="section-one__contact">Home</a>
        </div>

        <div class="contact-form">
            <form>
            <table>
                <tr>
                    <td>Name: </td>
                    <td><input type="text" placeholder="Enter your name" class="contact-form__input"></td>
                </tr>
                <tr>
                    <td>Email: </td>
                    <td><input type="email" placeholder="Enter your email" class="contact-form__input"></td>
                </tr>
                <tr>
                    <td>Message: </td>
                    <td><textarea name="Message" placeholder="Message" class="contact-form__textarea"></textarea></td>
                </tr>
                <tr>
                    <td></td>
                    <td><input type="submit" value="Submit" class="contact-form__submit"></td>
                </tr>
            </table>
        </form>
        </div>
        <div class="section-five">
            <p class="section-five__title">Social Media
                <a href="in">instagram</a>
                <a href="li">linkedin</a>
            </p>
            <p class="section-five__desc">&copy Dinesh Chandrasekar</p>
        </div>
    </div>
</body>

</html>
